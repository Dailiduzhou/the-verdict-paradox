syntax = "proto3";
package kratos.api;

import "google/protobuf/duration.proto";

option go_package = "github.com/Dailiduzhou/the-verdict-paradox/backend/app/game/internal/conf;conf";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Auth auth = 3;
}

message Auth {
  string access_token_secret = 1;
  google.protobuf.Duration access_token_timeout = 2;
  string refresh_token_secret = 3;
  google.protobuf.Duration refresh_token_timeout = 4;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  Database database = 1;
  Redis redis = 2;
}
